
<!DOCTYPE html>
<html>
<head>
<title>Assessment</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

<h2>Data Systems Assessment</h2>

<form id="assessmentForm">

<input type="hidden" name="referrer" value="landing_page">

<input name="name" placeholder="Name" required>
<input name="email" placeholder="Email" required>
<input name="role" placeholder="Role">
<input name="data_stack" placeholder="Current Data Stack">

<textarea name="data_challenge" placeholder="Biggest Data Challenge"></textarea>

<h3>Assessment Questions</h3>

<textarea name="q1" placeholder="How do you move data between systems?"></textarea>
<textarea name="q2" placeholder="Where do pipelines break most often?"></textarea>
<textarea name="q3" placeholder="How are analytics delivered?"></textarea>
<textarea name="q4" placeholder="Are you experimenting with AI?"></textarea>
<textarea name="q5" placeholder="What outcome would solve your problem?"></textarea>

<button type="submit">Submit</button>

</form>

<div id="response"></div>

</div>

<script src="app.js"></script>

</body>
</html>
